worker_processes  1;
events { worker_connections 1024; }

http {
    # WebSocket upgrade plumbing — Vite's HMR uses WS, so we need to pass
    # Upgrade/Connection through. The map yields "upgrade" when the request
    # has the Upgrade header, "close" otherwise.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Shared proxy settings — same for all three app server blocks.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 86400;

    # Shared TLS config — mkcert-issued cert covers all three hostnames.
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # HTTPS is required because browsers gate Web Crypto / Storage Access
    # to secure contexts. http://domainN.appN.int is NOT a secure context
    # (only localhost / 127.0.0.1 / https are), so keycloak-js can't mint
    # PKCE state without TLS.
    server {
        listen 443 ssl;
        server_name domain1.app1.int;
        location / { proxy_pass http://web-a:5173; }
    }

    server {
        listen 443 ssl;
        server_name domain2.app2.int;
        location / { proxy_pass http://web-b:5173; }
    }

    server {
        listen 443 ssl;
        server_name domain3.app3.int;
        location / { proxy_pass http://web-c:5173; }
    }

    # Redirect plain HTTP to HTTPS for the same names; everything else 404.
    server {
        listen 80;
        server_name domain1.app1.int domain2.app2.int domain3.app3.int;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80 default_server;
        return 404;
    }

    server {
        listen 443 ssl default_server;
        return 404;
    }
}
