micronaut:
  application:
    name: app2-bff
  server:
    cors:
      enabled: true
      configurations:
        all:
          allowedOrigins:
            - "http://localhost:5174"
            - "http://127.0.0.1:5174"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders:
            - "*"
  security:
    enabled: true
    authentication: bearer
    token:
      name-key: preferred_username
      roles-name: roles
      jwt:
        signatures:
          jwks:
            keycloak:
              url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080/realms/demo-realm}/protocol/openid-connect/certs
    intercept-url-map:
      - pattern: /**
        http-method: OPTIONS
        access:
          - isAnonymous()
      - pattern: /health
        access:
          - isAnonymous()
      - pattern: /api/**
        access:
          - isAuthenticated()

endpoints:
  health:
    enabled: true
    sensitive: false

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080/realms/demo-realm}
  client:
    secret: ${MICRONAUT_OIDC_CLIENT_SECRET:app2-client-secret}