version: "3.8"

# One Vite + React SPA (the "shell") signs the user in once and lazy-loads
# three role-gated microfrontends (client/ops/admin) from the same monorepo.
# The single BFF serves /api/whoami so the shell knows which MFEs to mount.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    command: ["start-dev", "--import-realm", "--verbose"]
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      KC_OPTS: "-Xmx2g"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      RESEND_API_TOKEN: "${RESEND_API_TOKEN}"
      RESEND_FROM: "Demo Realm <onboarding@resend.dev>"
      OTP_TRUST_WINDOW_MINUTES: "60"
      USER_SERVICE_URL: http://user-service:8080
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    networks:
      - keycloak-network
    ports:
      - "8888:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: keycloak-demo-user-service:latest
    environment:
      MICRONAUT_APPLICATION_NAME: user-service
    networks:
      - keycloak-network
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # MFE shell — one Vite dev server serves the workspace root, runs the `shell`
  # workspace's dev script, which lazy-imports the mfe-* workspace packages on
  # demand. `npm install` here installs the whole workspace and creates the
  # symlinks for mfe-client / mfe-ops / mfe-admin / shell-api.
  shell:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run -w shell dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    networks:
      - keycloak-network
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8888
      VITE_KEYCLOAK_CLIENT_ID: mfe-shell-client
      VITE_APP_NAME: "Demo Shell"
      VITE_APP_TITLE: "Microfrontend SSO Demo"
      VITE_APP_THEME: "a"
      BFF_URL: http://bff:8080

  bff:
    build:
      context: ./bff
    image: keycloak-demo-bff:latest
    networks:
      - keycloak-network
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      MICRONAUT_APPLICATION_NAME: bff
      APP_SOURCE: bff
      CORS_ORIGIN: http://localhost:5173
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080/realms/demo-realm

volumes:
  postgres_data:
  keycloak_data:

networks:
  keycloak-network:
    driver: bridge
