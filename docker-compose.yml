version: "3.8"

# Single frontend/ and bff/ codebase, run as two parameterized instances
# (web-a + bff-a, web-b + bff-b) to demonstrate SSO.

x-web-common: &web-common
  image: node:20-alpine
  working_dir: /app
  command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
  volumes:
    - ./frontend:/app
    - /app/node_modules # anonymous volume, isolated per container
  networks:
    - keycloak-network
  depends_on:
    keycloak:
      condition: service_healthy

x-bff-common: &bff-common
  build:
    context: ./bff
  image: keycloak-demo-bff:latest
  networks:
    - keycloak-network
  depends_on:
    keycloak:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Reverse proxy: whitelabel hostnames -> the three web-* apps + Keycloak.
  # Routes by Host header; see nginx/default.conf. Host port 80 needs
  # net.ipv4.ip_unprivileged_port_start<=80 under rootless Podman.
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: keycloak-demo-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,Z
    networks:
      - keycloak-network
    depends_on:
      - web-a
      - web-b
      - web-c
      - keycloak

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    command: ["start-dev", "--import-realm", "--verbose"]
    mem_limit: 4g
    mem_reservation: 2g
    environment:
      KC_OPTS: "-Xmx2g"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      RESEND_API_TOKEN: "${RESEND_API_TOKEN}"
      RESEND_FROM: "Demo Realm <onboarding@resend.dev>"
      OTP_TRUST_WINDOW_MINUTES: "60"
      USER_SERVICE_URL: http://user-service:8080
      # Public hostname (browser-facing) — Keycloak 26 hostname-v2. STRICT=false
      # keeps localhost:8888 + backchannel resolving by request host so the
      # CLAUDE.md curl/admin scripts keep working. Plain HTTP behind nginx.
      KC_HOSTNAME: https://auth.home.arpa
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    networks:
      - keycloak-network
    ports:
      - "8888:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy

  # Standalone user store. The Keycloak SPI is a thin REST client of this;
  # the API is generated on both sides from user-api/openapi.yaml. Built once
  # into a fat-jar image (like bff/), context is the repo root so the build
  # can read user-api/openapi.yaml.
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: keycloak-demo-user-service:latest
    environment:
      MICRONAUT_APPLICATION_NAME: user-service
    networks:
      - keycloak-network
    ports:
      - "8090:8080"
    healthcheck:
      # eclipse-temurin (Ubuntu) has bash; /bin/sh is dash so invoke bash. The
      # Micronaut status line is "200 Ok", so match on " 200 " not "200 OK".
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q ' 200 ' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  web-a:
    <<: *web-common
    ports:
      - "5173:5173"
    environment:
      VITE_KEYCLOAK_URL: https://auth.home.arpa
      VITE_KEYCLOAK_CLIENT_ID: app1-client
      VITE_APP_NAME: "App A"
      VITE_APP_TITLE: "client space"
      VITE_APP_THEME: "a"
      BFF_URL: http://bff-a:8080

  web-b:
    <<: *web-common
    ports:
      - "5174:5173"
    environment:
      VITE_KEYCLOAK_URL: https://auth.home.arpa
      VITE_KEYCLOAK_CLIENT_ID: app2-client
      VITE_APP_NAME: "App B"
      VITE_APP_TITLE: "client self service"
      VITE_APP_THEME: "b"
      BFF_URL: http://bff-b:8080

  web-c:
    <<: *web-common
    ports:
      - "5175:5173"
    environment:
      VITE_KEYCLOAK_URL: https://auth.home.arpa
      VITE_KEYCLOAK_CLIENT_ID: app3-client
      VITE_APP_NAME: "App C (admin)"
      VITE_APP_TITLE: "restricted admin area"
      VITE_APP_THEME: "c"
      BFF_URL: http://bff-c:8080

  bff-a:
    <<: *bff-common
    ports:
      - "8081:8080"
    environment:
      MICRONAUT_APPLICATION_NAME: bff-a
      APP_SOURCE: bff-a
      CORS_ORIGIN: https://client.home.arpa
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080/realms/demo-realm

  bff-b:
    <<: *bff-common
    ports:
      - "8082:8080"
    environment:
      MICRONAUT_APPLICATION_NAME: bff-b
      APP_SOURCE: bff-b
      APP_ALLOWED_ROLES: "user,admin"
      CORS_ORIGIN: https://user.home.arpa
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080/realms/demo-realm

  bff-c:
    <<: *bff-common
    ports:
      - "8083:8080"
    environment:
      MICRONAUT_APPLICATION_NAME: bff-c
      APP_SOURCE: bff-c
      APP_ALLOWED_ROLES: "admin"
      CORS_ORIGIN: https://admin.home.arpa
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080/realms/demo-realm

volumes:
  postgres_data:
  keycloak_data:

networks:
  keycloak-network:
    driver: bridge
