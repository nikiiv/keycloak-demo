# Reverse proxy for the whitelabel hostnames, TLS-terminating.
#
# Self-signed cert is baked into the image by Dockerfile.nginx (no host setup).
# HTTPS makes every *.home.arpa origin a secure context so keycloak-js 26's
# crypto.randomUUID / crypto.subtle work and PKCE login succeeds. nginx talks
# plain HTTP/ws to the backends; TLS stops at this hop. X-Forwarded-Proto=https
# tells Keycloak hostname-v2 and the Vite HMR client to use https/wss.
#
# proxy_pass targets use compose service DNS + CONTAINER ports (not host ports).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Plain HTTP -> HTTPS redirect for every hostname.
server {
    listen 80;
    server_name client.home.arpa user.home.arpa admin.home.arpa auth.home.arpa;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name client.home.arpa;

    ssl_certificate     /etc/nginx/certs/home-arpa.pem;
    ssl_certificate_key /etc/nginx/certs/home-arpa-key.pem;

    location / {
        proxy_pass http://web-a:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name user.home.arpa;

    ssl_certificate     /etc/nginx/certs/home-arpa.pem;
    ssl_certificate_key /etc/nginx/certs/home-arpa-key.pem;

    location / {
        proxy_pass http://web-b:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.home.arpa;

    ssl_certificate     /etc/nginx/certs/home-arpa.pem;
    ssl_certificate_key /etc/nginx/certs/home-arpa-key.pem;

    location / {
        proxy_pass http://web-c:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name auth.home.arpa;

    ssl_certificate     /etc/nginx/certs/home-arpa.pem;
    ssl_certificate_key /etc/nginx/certs/home-arpa-key.pem;

    location / {
        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
