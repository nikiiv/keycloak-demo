# Optional dev overlay for the demo. Use alongside docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# What this changes vs the default demo stack:
#
#  1. MFE containers run `npm run -w <mfe> dev` instead of `build && preview`.
#     The dev script kicks off `vite build` once, then runs
#     `vite build --watch` concurrently with `vite preview`. Save a file in
#     apps/mfe-<X>/src/** → ~1-2s incremental rebuild → hard-refresh the
#     browser to pick up the new bundle. Container does NOT restart.
#
#  2. Shell BFF URLs become overridable from the host environment so you can
#     redirect /api/* at a host-running Gradle process (Level 3). The defaults
#     match the in-network hostnames so omitting them gives the same wiring
#     as the production-ish demo.
#
# Level 3 BFF dev (after running dev-bff.sh on the host):
#
#   BFF_CLIENT_URL=http://host.docker.internal:8081 \
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#                    up -d --force-recreate shell
#
# Use host.containers.internal on Podman.

services:
  shell:
    environment:
      BFF_SHELL_URL: ${BFF_SHELL_URL:-http://bff-client:8080}
      BFF_CLIENT_URL: ${BFF_CLIENT_URL:-http://bff-client:8080}
      BFF_OPS_URL: ${BFF_OPS_URL:-http://bff-ops:8080}
      BFF_ADMIN_URL: ${BFF_ADMIN_URL:-http://bff-admin:8080}

  mfe-client:
    command: sh -c "npm install && npm run -w mfe-client dev"

  mfe-ops:
    command: sh -c "npm install && npm run -w mfe-ops dev"

  mfe-admin:
    command: sh -c "npm install && npm run -w mfe-admin dev"
