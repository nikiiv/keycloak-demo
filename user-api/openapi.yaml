
openapi: 3.0.3
info:
  title: Demo User Store API
  description: >
    Contract for the standalone user store that backs the Keycloak demo.
    The Keycloak User Storage SPI is a generated client of this API; the
    Micronaut user-service is a generated server implementation of it.
    This spec is the single source of truth for both sides.
  version: 1.0.0

servers:
  - url: http://user-service:8080
    description: In-compose service address (used by Keycloak)
  - url: http://localhost:8090
    description: Host-exposed address (for direct curl/debug)

tags:
  - name: Users
    description: User lookup and credential verification

paths:
  /users/{username}:
    get:
      tags: [Users]
      operationId: getUserByUsername
      summary: Look up a user by username
      description: >
        Returns the user's profile and role names. Also serves the SPI's
        getUserById path, since the demo's external id equals the username.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: No such user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      tags: [Users]
      operationId: getUserByEmail
      summary: Look up a user by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: No user with that email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/verify-credentials:
    post:
      tags: [Users]
      operationId: verifyCredentials
      summary: Verify a username/password pair
      description: >
        Always returns 200 with a boolean result so the caller can
        distinguish "reachable, wrong password" (valid=false) from a
        transport/availability failure (which the caller treats as
        fail-closed). The password is only ever sent in this request body
        and never appears in any response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCredentialsRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCredentialsResponse"

components:
  schemas:
    User:
      type: object
      required:
        - username
        - roles
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        roles:
          type: array
          items:
            type: string

    VerifyCredentialsRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    VerifyCredentialsResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
